data_prep:
  data:
    dataset: ""              # Dataset token to preprocess, e.g. s-mnist, shd, deap.
    raw_data_root: ""        # Root directory containing original/raw dataset files.
    prep_root: ""            # Output root where prepared <dataset>/manifest.yaml and .npy files are written.
    prep_profile: ""         # Optional preprocessing profile; blank uses the dataset default.
  sampling:
    seed: ""                 # Global preprocessing seed recorded in the manifest.
    max_samples: ""          # Optional maximum samples per split; blank uses full data.
  dataset_options:
    deap_label_axis: ""      # DEAP target axis: valence or arousal.
    deap_num_classes: ""     # DEAP class count: 2 or 3.
    shd_dt_ms: ""            # SHD event bin size in milliseconds.
    shd_max_time: ""         # SHD maximum encoded time in seconds.
    ssc_dt_ms: ""            # SSC event bin size in milliseconds.
    ssc_max_time: ""         # SSC maximum encoded time in seconds.
  io:
    force_overwrite: ""      # true overwrites an existing prepared bundle.
    download: ""             # true lets the preprocessor download supported raw data.
