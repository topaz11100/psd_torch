  signal_window: hann
  psd_reg_output_family: spike
  pca_dim_per_layer:
  - 4
  w_clip_edges: null
  alpha_clip_edges: null
  scenario_mode: none
  band_edge: null
  tear: 1
  compile_cpu_threads: 2
  compile: true
  amp: 'off'
  ddp_timeout_minutes: 240
  lambda_psd_rep_input: 0.0
  lambda_psd_rep_adjacent: 0.0
  lambda_psd_pca_input: 0.0
  lambda_psd_pca_adjacent: 0.0
