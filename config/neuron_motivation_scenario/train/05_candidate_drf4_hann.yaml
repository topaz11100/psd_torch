model_training:
  dataset: s-mnist
  prep_root: /home/yongokhan/workspace/data/prep_data
  checkpoint_root: /home/yongokhan/workspace/result/neuron_motivation_scenario/05_candidate_drf4_hann/checkpoints
  metric_root: /home/yongokhan/workspace/result/neuron_motivation_scenario/05_candidate_drf4_hann/metrics
