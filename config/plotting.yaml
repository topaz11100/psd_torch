plotting:
  input_output:
    input: ""                # Batch directory or single CSV file to plot.
    output: ""               # Output plot directory; blank uses the program default.
    output_root: ""          # Deprecated alias of output, retained for compatibility.
    manifest_name: ""        # Manifest YAML filename under output_root.
  rendering:
    format: ""               # Figure format; currently png.
    overwrite: ""            # true overwrites existing figure files.
    include_filter_count: "" # true includes count statistic in filter_snapshot plots.
  output:
    run_timestamp: ""        # Optional run_<timestamp> suffix.
    timestamped_output: ""   # true writes under a timestamped run directory.
