element_psd:

  data:
    checkpoint: ""           # Single .pt checkpoint or strict .pt-only checkpoint directory.
    dataset: ""              # Dataset token stored in checkpoint metadata.
    prep_root: ""            # Prepared data root containing <dataset>/manifest.yaml.
  output:
    output_root: ""          # Root directory for analysis CSV/YAML artifacts.
    run_timestamp: ""        # Optional run_<timestamp> suffix.
    timestamped_output: ""   # true writes under a timestamped run directory.
  runtime:
    anal_batch: ""           # Maximum samples per analysis forward pass.
    gpu_index: ""            # CUDA device index.
    seed: ""                 # Analysis seed; blank falls back to checkpoint seed.
    num_workers: ""          # Probe DataLoader worker count.
    low_vram: ""             # 1 stages traces through CPU to reduce VRAM.

  signal:
    signal_window: ""        # PSD temporal taper: hann or none.
